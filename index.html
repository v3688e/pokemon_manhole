<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokéfuta Explorer - Pokémon Manhole Locations</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 id="title">Pokéfuta Explorer</h1>
            <p id="subtitle" style="text-align: center; color: #666; margin-top: -20px;">Discover Pokémon-themed manhole covers across Japan</p>
        </header>

        <div class="controls">
            <div class="lang-switch">
                <button class="lang-btn active" onclick="setLanguage('ja')">JP</button>
                <button class="lang-btn" onclick="setLanguage('en')">EN</button>
            </div>
            <div class="search-container">
                <input type="text" id="search" placeholder="Search by name, zone, or address...">
            </div>
            <div class="stats" id="stats">Loading data...</div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th data-sort="index" id="h-index">Index</th>
                        <th data-sort="id" id="h-no">No</th>
                        <th data-sort="zone" id="h-zone">Zone</th>
                        <th data-sort="location" id="h-location">Location</th>
                        <th id="h-coords">Coordinates</th>
                        <th data-sort="address" id="h-address">Address</th>
                        <th id="h-link">Link</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Data will be injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <div id="tooltip" class="tooltip">Copied!</div>

    <script src="script.js"></script>
</body>
</html>
